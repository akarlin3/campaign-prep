    <!-- Bottom-Left Face -->
    <polygon points="195,221 100,346 256,326" fill="#dbc7a2" />
    
    <!-- Bottom-Right Face -->
    <polygon points="317,221 256,326 412,346" fill="#d3bd95" />
    
