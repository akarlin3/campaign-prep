<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#b1201e"/>
  
  <g stroke="#f5ecd7" stroke-width="14" stroke-linejoin="round" stroke-linecap="round">
    <!-- Top-Left Face -->
    <polygon points="100,166 256,76 195,221" fill="#ebdbb8" />
    
    <!-- Top Face -->
    <polygon points="256,76 317,221 195,221" fill="#e7d5b2" />
    
    <!-- Top-Right Face -->
    <polygon points="256,76 412,166 317,221" fill="#ebdaba" />
    
    <!-- Left Face -->
