type User @table {
  displayName: String!
  email: String
  photoUrl: String
  createdAt: Timestamp!
}

type Campaign @table {
  user: User! @ref(onDelete: CASCADE)
  name: String!
  description: String
  gameSystem: String
  createdAt: Timestamp!
}

type Npc @table {
  campaign: Campaign! @ref(onDelete: CASCADE)
  name: String!
  description: String
  # Structured stat block — individual attributes are first-class columns so
  # they can be queried/mutated without parsing a serialized String blob.
  armorClass: Int
  hitPoints: Int
  speed: Int
  strength: Int
  dexterity: Int
  constitution: Int
  intelligence: Int
  wisdom: Int
  charisma: Int
  proficiencyBonus: Int
  challengeRating: Float
  imageUrl: String
  status: String
  createdAt: Timestamp!
}

type Encounter @table {
  campaign: Campaign! @ref(onDelete: CASCADE)
  name: String!
  location: String!
  difficulty: String!
  description: String
  status: String
  createdAt: Timestamp!
}

type EncounterNpc @table(key: ["encounter", "npc"]) {
  encounter: Encounter! @ref(onDelete: CASCADE)
  npc: Npc! @ref(onDelete: CASCADE)
  roleInEncounter: String
  createdAt: Timestamp!
}

type Note @table {
  user: User! @ref(onDelete: CASCADE)
  content: String!
  # Optional parent links: null the reference rather than delete the note when
  # the linked entity is removed, since a note can stand on its own.
  campaign: Campaign @ref(onDelete: SET_NULL)
  npc: Npc @ref(onDelete: SET_NULL)
  encounter: Encounter @ref(onDelete: SET_NULL)
  createdAt: Timestamp!
}
