<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Gamemaster Assistant">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="55%" stop-color="#241a14"/>
      <stop offset="100%" stop-color="#0f0a07"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7e1a1"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8a6a1a"/>
    </linearGradient>
    <linearGradient id="parchment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3ead5"/>
      <stop offset="100%" stop-color="#e6d8b5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#d4af37" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <circle cx="200" cy="160" r="220" fill="url(#glow)"/>
  <circle cx="1000" cy="160" r="180" fill="url(#glow)" opacity="0.6"/>

  <!-- Decorative hex grid -->
  <g stroke="#3a2d1f" stroke-width="1" fill="none" opacity="0.5">
    <path d="M50 60 L80 45 L110 60 L110 90 L80 105 L50 90 Z"/>
    <path d="M1050 230 L1080 215 L1110 230 L1110 260 L1080 275 L1050 260 Z"/>
    <path d="M1130 60 L1150 50 L1170 60 L1170 80 L1150 90 L1130 80 Z"/>
    <path d="M30 230 L50 220 L70 230 L70 250 L50 260 L30 250 Z"/>
  </g>

  <!-- d20 logo: hexagonal frame with internal triangulation -->
  <g transform="translate(160,160)" filter="url(#softShadow)">
    <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50"
             fill="#0f0a07" stroke="url(#gold)" stroke-width="4" stroke-linejoin="round"/>
    <g stroke="url(#gold)" stroke-width="2.5" fill="none" stroke-linecap="round">
      <line x1="0" y1="-100" x2="0" y2="100"/>
      <line x1="-87" y1="-50" x2="87" y2="-50"/>
      <line x1="-87" y1="50" x2="87" y2="50"/>
      <line x1="-87" y1="-50" x2="0" y2="-70"/>
      <line x1="87" y1="-50" x2="0" y2="-70"/>
      <line x1="0" y1="-70" x2="0" y2="100"/>
      <line x1="-87" y1="50" x2="0" y2="100"/>
      <line x1="87" y1="50" x2="0" y2="100"/>
    </g>
    <polygon points="0,-100 87,-50 0,-70" fill="url(#gold)" opacity="0.18"/>
    <polygon points="-87,-50 0,-70 0,100 -87,50" fill="url(#gold)" opacity="0.08"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(330,140)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif"
          font-size="56" font-weight="700" fill="url(#parchment)" letter-spacing="-1">
      Gamemaster Assistant
    </text>
    <text x="0" y="42" font-family="Georgia, serif" font-size="20" font-style="italic" fill="#d4af37">
      Less time planning. More time playing.
    </text>
    <text x="0" y="86" font-family="'SF Mono', Menlo, monospace" font-size="13" fill="#a8967a" letter-spacing="3">
      LAZY DM  ·  COLLABORATIVE CAMPAIGN  ·  PROACTIVE ROLEPLAYING
    </text>
    <line x1="0" y1="60" x2="700" y2="60" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
