<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="Three methodologies feed into one workflow">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7efd8"/>
      <stop offset="100%" stop-color="#eddfbd"/>
    </linearGradient>
    <linearGradient id="appBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a1a1a"/>
      <stop offset="100%" stop-color="#3a0e0e"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8881e"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="bookShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#3a2d1f" flood-opacity="0.35"/>
    </filter>
    <filter id="appShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <marker id="arrowGold" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#d4af37"/>
    </marker>
  </defs>

  <rect width="1200" height="520" fill="#f3ead5"/>

  <!-- Top label -->
  <text x="600" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#5a1a1a">
    Three Methodologies, One Workflow
  </text>
  <text x="600" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-style="italic" fill="#7a5d2a">
    Each prep section in the app traces back to a specific chapter of the source material.
  </text>

  <!-- Book 1: Lazy DM -->
  <g transform="translate(80,120)" filter="url(#bookShadow)">
    <rect x="0" y="0" width="240" height="160" rx="6" fill="url(#paper)" stroke="#a8821e" stroke-width="2"/>
    <rect x="0" y="0" width="14" height="160" fill="#7a4520"/>
    <text x="130" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#3a2d1f">Lazy Dungeon Master</text>
    <text x="130" y="64" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#7a5d2a">Mike Shea</text>
    <line x1="30" y1="78" x2="220" y2="78" stroke="#a8821e" stroke-width="1" opacity="0.5"/>
    <text x="130" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#3a2d1f">8-step session checklist</text>
    <text x="130" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#3a2d1f">Secrets · Locations · NPCs</text>
    <text x="130" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#3a2d1f">Monsters · Magic items</text>
  </g>

  <!-- Book 2: Collaborative Campaign Design -->
  <g transform="translate(480,120)" filter="url(#bookShadow)">
    <rect x="0" y="0" width="240" height="160" rx="6" fill="url(#paper)" stroke="#a8821e" stroke-width="2"/>
    <rect x="0" y="0" width="14" height="160" fill="#1f4a2a"/>
    <text x="130" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#3a2d1f">Collaborative Campaign</text>
    <text x="130" y="64" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#7a5d2a">Session −1 design</text>
    <line x1="30" y1="78" x2="220" y2="78" stroke="#a8821e" stroke-width="1" opacity="0.5"/>
    <text x="130" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#3a2d1f">Givens · World facts</text>
    <text x="130" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#3a2d1f">Factions · Conflicts</text>
    <text x="130" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#3a2d1f">Content lines (hard nos)</text>
  </g>

  <!-- Book 3: Proactive Roleplaying -->
  <g transform="translate(880,120)" filter="url(#bookShadow)">
    <rect x="0" y="0" width="240" height="160" rx="6" fill="url(#paper)" stroke="#a8821e" stroke-width="2"/>
    <rect x="0" y="0" width="14" height="160" fill="#4a1f4a"/>
    <text x="130" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#3a2d1f">Proactive Roleplaying</text>
    <text x="130" y="64" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#7a5d2a">5 Rules of Proactive Fun</text>
    <line x1="30" y1="78" x2="220" y2="78" stroke="#a8821e" stroke-width="1" opacity="0.5"/>
    <text x="130" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#3a2d1f">PC goals &amp; bonds</text>
    <text x="130" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#3a2d1f">Faction clocks</text>
    <text x="130" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#3a2d1f">Stakes &amp; consequences</text>
  </g>

  <!-- Arrows down -->
  <g stroke="#d4af37" stroke-width="3" fill="none" marker-end="url(#arrowGold)">
    <path d="M200 290 Q200 340 380 360"/>
    <path d="M600 290 Q600 340 600 360"/>
    <path d="M1000 290 Q1000 340 820 360"/>
  </g>

  <!-- App panel -->
  <g transform="translate(280,380)" filter="url(#appShadow)">
    <rect x="0" y="0" width="640" height="110" rx="10" fill="url(#appBg)" stroke="url(#gold2)" stroke-width="2"/>
    <text x="320" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#f3ead5">
      Gamemaster Assistant
    </text>
    <text x="320" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#d4af37">
      One synced, offline-first workflow
    </text>
    <!-- mini tabs -->
    <g font-family="Georgia, serif" font-size="11" fill="#f3ead5" letter-spacing="2">
      <rect x="40"  y="75" width="100" height="22" rx="3" fill="#7a1f1f" stroke="#d4af37" stroke-width="0.5"/>
      <text x="90"  y="91" text-anchor="middle">PLAN</text>
      <rect x="150" y="75" width="100" height="22" rx="3" fill="#3a0e0e" stroke="#d4af37" stroke-width="0.5"/>
      <text x="200" y="91" text-anchor="middle">PREP</text>
      <rect x="260" y="75" width="100" height="22" rx="3" fill="#3a0e0e" stroke="#d4af37" stroke-width="0.5"/>
      <text x="310" y="91" text-anchor="middle">ORGANIZE</text>
      <rect x="370" y="75" width="100" height="22" rx="3" fill="#3a0e0e" stroke="#d4af37" stroke-width="0.5"/>
      <text x="420" y="91" text-anchor="middle">RUN</text>
      <rect x="480" y="75" width="120" height="22" rx="3" fill="#3a0e0e" stroke="#d4af37" stroke-width="0.5"/>
      <text x="540" y="91" text-anchor="middle">LIBRARY · ORACLE</text>
    </g>
  </g>
</svg>
